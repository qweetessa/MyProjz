<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventra with Logo</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif;">

  <!-- Navigation with logo -->
  <nav style="display: flex; align-items: center; justify-content: space-between; background-color: #5b1510; padding: 1rem 2rem; position: fixed; top: 0; width: 100%; z-index: 999;">
    <div style="display: flex; align-items: center;">
      <img src="b2067d16-3347-46b5-bcef-5e3461914b8b.png" alt="Logo" style="height: 40px; margin-right: 0.75rem;" />
      <span style="color: white; font-weight: bold; font-size: 1.25rem;">Eventra</span>
    </div>
    <div>
      <a href="#" style="color: white; text-decoration: none; margin: 0 1rem;">Home</a>
      <a href="#photo-gallery" style="color: white; text-decoration: none; margin: 0 1rem;">Gallery</a>
      <a href="#" style="color: white; text-decoration: none; margin: 0 1rem;">Contact</a>
    </div>
  </nav>

  <!-- Hero space to push content below fixed nav -->
  <div style="height: 80px;"></div>

  <!-- Photo Gallery Section -->
  <section id="photo-gallery" style="padding: 2rem;">
    <h2 style="text-align: center; font-size: 2rem; color: #5b1510;">Photo Gallery</h2>
    <p style="text-align: center; max-width: 600px; margin: auto;">
      Explore our featured event photos. Click on categories to filter images.
    </p>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 2rem;">
      <img src="https://via.placeholder.com/300x200" alt="Event 1" style="width: 100%; border-radius: 8px;">
      <img src="https://via.placeholder.com/300x200" alt="Event 2" style="width: 100%; border-radius: 8px;">
      <img src="https://via.placeholder.com/300x200" alt="Event 3" style="width: 100%; border-radius: 8px;">
    </div>
  </section>

</body>
</html>
