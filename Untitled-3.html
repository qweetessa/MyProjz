    <title>Explore India - Image Gallery</title>
    <style>
        /* General styling for the gallery container */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20;
            padding: 50;
            background-color: #43381b;
        }

        /* Styling for each image container */
        .gallery img {
            width: 90%;
            border: 2x solid #504e4e0e;
            border-radius: 8px;
            padding: 5px;
            background-color: #c79426;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* Hover effect on images */
        .gallery img:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(65, 53, 53, 0.2);
        }
    </style>
