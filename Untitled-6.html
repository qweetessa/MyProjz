<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Fest 2025</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .content {
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
        }
        .content h2 {
            margin-top: 0;
        }
        .content p {
            margin: 10px 0;
        }
        .register-btn {
            display: inline-block;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
        }
        .register-btn:hover {
            background-color: #0056b3;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Tech Fest 2025</h1>
    </header>
    <div class="content">
        <h2>Join Us for an Exciting Event!</h2>
        <p>Date: March 15, 2025</p>
        <p>Location: College Auditorium</p>
        <p>Explore the latest in technology, innovation, and creativity.</p>
        <a href="#" class="register-btn">Register Now</a>
    </div>
    <footer>
        <p>&copy; 2025 Tech Fest. All Rights Reserved.</p>
    </footer>
</body>
</html>
