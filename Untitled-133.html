<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #875757;
        }

        .profile-card {
            text-align: center;
            background: #ebcfcf;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .profile-card h2 {
            margin: 10px 0;
            font-size: 1.5em;
            color: #333;
        }

        .profile-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .profile-card a {
            text-decoration: none;
            color: #cd518f;
            margin: 0 10px;
            font-size: 1.2em;
        }

        .profile-card a:hover {
            color : #cd518f;
        }
    </style>
</head>
<body>
    <div class="profile-card">
    
        <h2>Iqra Rashid</h2>
        <p>Web Developer | Tech Enthusiast</p>
        <div>
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://github.com" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
