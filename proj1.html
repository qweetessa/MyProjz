<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            min-height: 100vh;
            overflow: hidden;
        }

        .half-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background-image: url('https://via.placeholder.com/1920x1080/87CEEB/FFFFFF?text=Background+Image'); /* Replace with your image URL */
            background-size: cover; /* Ensure the image covers the entire area */
            background-position: center; /* Center the image */
            background-repeat: no-repeat;  /* Prevent image repetition */
            z-index: -1;
        }

        .content-container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .image-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .image-item:hover {
            transform: scale(1.05);
        }

        .image-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            .half-background {
                height: 30%;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="half-background"></div>
        <div class="content-container">
            <header class="gallery-header">
                <h1>Event Gallery</h1>
            </header>
            <section class="image-grid">
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/87CEEB/FFFFFF?text=Event+1" alt="Event 1">
                </div>
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/98FB98/FFFFFF?text=Event+2" alt="Event 2">
                </div>
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/F08080/FFFFFF?text=Event+3" alt="Event 3">
                </div>
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/FFA07A/FFFFFF?text=Event+4" alt="Event 4">
                </div>
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/DDA0DD/FFFFFF?text=Event+5" alt="Event 5">
                </div>
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/ADD8E6/FFFFFF?text=Event+6" alt="Event 6">
                </div>
                 <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/87CEEB/FFFFFF?text=Event+7" alt="Event 7">
                </div>
                <div class="image-item">
                    <img src="https://via.placeholder.com/400x300/98FB98/FFFFFF?text=Event+8" alt="Event 8">
                </div>
            </section>
            <footer>
                <p>&copy; 2025 Eventra. All rights reserved.</p>
            </footer>
        </div>
    </div>
</body>
</html>
